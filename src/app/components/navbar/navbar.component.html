<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="nav-inner">
    <!-- Logo -->
    <a class="nav-logo" (click)="scrollTo('#hero')" href="javascript:void(0)">
      <span class="logo-bracket">[</span>
      <span class="logo-text">PT</span>
      <span class="logo-bracket">]</span>
      <span class="logo-cursor">_</span>
    </a>

    <!-- Desktop Links -->
    <ul class="nav-links">
      @for (link of navLinks; track link.label) {
        <li>
          <a
            class="nav-link"
            href="javascript:void(0)"
            (click)="scrollTo(link.href)"
          >
            <span class="link-prefix"></span>{{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- Right Controls -->
    <div class="nav-controls">
      <!-- Theme Toggle -->
      <button
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="
          isDark() ? 'Switch to light mode' : 'Switch to dark mode'
        "
      >
        @if (isDark()) {
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        } @else {
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        }
      </button>

      <!-- CTA -->
      <a class="nav-cta" href="mailto:prakshiltripathi@gmail.com">
        <span>hire me</span>
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <line x1="7" y1="17" x2="17" y2="7" />
          <polyline points="7 7 17 7 17 17" />
        </svg>
      </a>

      <!-- Mobile Hamburger -->
      <button
        class="hamburger"
        (click)="toggleMenu()"
        [class.open]="menuOpen()"
        aria-label="Toggle menu"
      >
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div class="mobile-menu">
      @for (link of navLinks; track link.label) {
        <a
          class="mobile-link"
          href="javascript:void(0)"
          (click)="scrollTo(link.href)"
        >
          <span class="mono">{{ link.label }}</span>
        </a>
      }
      <a class="mobile-cta" href="mailto:prakshil@example.com">hire me →</a>
    </div>
  }
</nav>
